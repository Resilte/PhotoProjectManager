# App Configuration Template
# 复制此文件为 app_config.properties，并填写你自己的参数

# 是否使用暗色主题（true / false）
dark.mode=false

# 百度网盘 API（在 https://pan.baidu.com/union/application 申请）
# 以下为示例，请替换为你自己的 Key
baidu.app.key=YOUR_BAIDU_APP_KEY_HERE
baidu.secret.key=YOUR_BAIDU_SECRET_KEY_HERE
baidu.access.token=

# 背景图片路径（可选，留空则使用默认背景）
background.image.path=
